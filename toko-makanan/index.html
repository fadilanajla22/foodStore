<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manajemen Penjualan Toko Makanan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .toast { animation: slideIn 0.3s ease, fadeOut 0.5s ease 2.5s forwards; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
  </style>
</head>
<body class="min-h-screen bg-gray-100 text-gray-800">

  <!-- Navbar -->
  <header class="bg-blue-700 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-3">
      <div class="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold leading-tight">Toko Makanan</h1>
        <p class="text-blue-200 text-xs">Sistem Manajemen Penjualan</p>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">

    <!-- Form Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-base font-semibold text-gray-700 mb-5 flex items-center gap-2">
        <span class="w-6 h-6 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center text-xs font-bold">+</span>
        Input Data Penjualan
      </h2>

      <form id="form-penjualan" novalidate>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Nama Pembeli</label>
            <input id="nama" type="text" placeholder="Contoh: Budi Santoso" required
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Jenis Makanan</label>
            <select id="makanan"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition bg-white">
              <option value="">-- Pilih Makanan --</option>
              <option>Nasi Goreng</option>
              <option>Mie Ayam</option>
              <option>Bakso</option>
              <option>Soto Ayam</option>
              <option>Ayam Bakar</option>
              <option>Gado-Gado</option>
              <option>Pecel Lele</option>
              <option>Lainnya</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Jumlah</label>
            <input id="jumlah" type="number" min="1" placeholder="0" required
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Harga Satuan (Rp)</label>
            <input id="harga" type="number" min="0" placeholder="0" required
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition" />
          </div>

          <div class="sm:col-span-2">
            <label class="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">Total Harga</label>
            <div id="total-display"
              class="w-full border border-blue-200 bg-blue-50 rounded-xl px-4 py-2.5 text-sm font-semibold text-blue-700">
              Rp 0
            </div>
            <input id="total" type="hidden" value="0" />
          </div>
        </div>

        <div class="mt-5 flex items-center gap-3">
          <button id="submit-btn" type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition flex items-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            Simpan Data
          </button>
          <div id="loading" class="hidden items-center gap-2 text-blue-600 text-sm">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
            Menyimpan...
          </div>
        </div>
      </form>
    </div>

    <!-- Tabel Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-base font-semibold text-gray-700">Data Penjualan</h2>
        <button onclick="loadData()"
          class="text-xs text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1 transition">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          Refresh
        </button>
      </div>

      <!-- Summary -->
      <div id="summary" class="hidden grid grid-cols-2 sm:grid-cols-3 gap-3 mb-5"></div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wide">
              <th class="py-3 px-3 text-center rounded-l-lg">No</th>
              <th class="py-3 px-3 text-left">Nama Pembeli</th>
              <th class="py-3 px-3 text-left">Jenis Makanan</th>
              <th class="py-3 px-3 text-center">Jumlah</th>
              <th class="py-3 px-3 text-right">Harga Satuan</th>
              <th class="py-3 px-3 text-right">Total</th>
              <th class="py-3 px-3 text-left rounded-r-lg">Waktu</th>
            </tr>
          </thead>
          <tbody id="tabel-body"></tbody>
        </table>
      </div>

      <div id="loading-tabel" class="flex items-center justify-center gap-2 py-10 text-blue-500">
        <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        <span class="text-sm">Memuat data...</span>
      </div>
      <div id="empty-tabel" class="hidden text-center py-10 text-gray-400 text-sm">
        Belum ada data penjualan.
      </div>
    </div>
  </main>

  <div id="toast-container" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

  <script src="config.js"></script>
  <script src="sales.js"></script>
</body>
</html>
